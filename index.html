<!DOCTYPE html>
<html>
<head>
    <title>My Supercar Collection</title>
    <style>
        body { 
            background-color: white; 
            margin: 0;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }
        h1 { color: #333; margin-bottom: 40px; text-transform: uppercase; }
        .car-container { width: 90%; max-width: 600px; margin-bottom: 50px; text-align: center; }
        h2 { color: #1F51FF; margin-bottom: 15px; }
        img { 
            width: 100%; 
            border-radius: 15px; 
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <h1>Supercar Collection</h1>

    <div class="car-container">
        <h2>BMW M5 CS</h2>
        <img src="https://images.unsplash.com" alt="BMW M5 CS">
    </div>

    <div class="car-container">
        <h2>McLaren 720S</h2>
        <img src="https://images.unsplash.com" alt="McLaren">
    </div>

    <div class="car-container">
        <h2>Lamborghini Aventador SVJ</h2>
        <img src="https://images.unsplash.com" alt="Lamborghini">
    </div>

</body>
</html>
