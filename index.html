<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FC Mobile Squad Compare</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px; }
        .header { margin-bottom: 40px; border-bottom: 3px solid #edff00; display: inline-block; padding-bottom: 10px; }
        .container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        
        /* Team Cards */
        .card { background: #1a1a1a; border: 2px solid #333; border-radius: 20px; padding: 30px; width: 300px; transition: 0.5s; }
        .winner { border-color: #edff00; box-shadow: 0 0 30px rgba(237, 255, 0, 0.4); transform: scale(1.08); }
        
        /* Inputs */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input { width: 90%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 16px; }
        input:focus { border-color: #edff00; outline: none; }

        /* Button */
        button { background: #edff00; color: black; border: none; padding: 20px 50px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 50px; transition: 0.2s; }
        button:hover { transform: scale(1.1); background: #f5ff66; }

        #result-text { margin-top: 40px; font-size: 32px; color: #edff00; height: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FC MOBILE: SQUAD BATTLE</h1>
    </div>

    <div class="container">
        <!-- Team 1 -->
        <div class="card" id="card1">
            <h2 style="color:#edff00">TEAM A</h2>
            <div class="input-group">
                <label>IN-GAME USERNAME</label>
                <input type="text" id="name1" placeholder="Ex: FC_Gamer1">
            </div>
            <div class="input-group">
                <label>TEAM OVR</label>
                <input type="number" id="ovr1" placeholder="Ex: 101">
            </div>
        </div>

        <!-- Team 2 -->
        <div class="card" id="card2">
            <h2 style="color:#edff00">TEAM B</h2>
            <div class="input-group">
                <label>IN-GAME USERNAME</label>
                <input type="text" id="name2" placeholder="Ex: ProPlayer99">
            </div>
            <div class="input-group">
                <label>TEAM OVR</label>
                <input type="number" id="ovr2" placeholder="Ex: 99">
            </div>
        </div>
    </div>

    <button onclick="compareTeams()">COMPARE SQUADS</button>

    <div id="result-text"></div>

    <script>
        function compareTeams() {
            // Get values from inputs
            let name1 = document.getElementById('name1').value || "Team A";
            let ovr1 = parseInt(document.getElementById('ovr1').value) || 0;
            let name2 = document.getElementById('name2').value || "Team B";
            let ovr2 = parseInt(document.getElementById('ovr2').value) || 0;

            let c1 = document.getElementById('card1');
            let c2 = document.getElementById('card2');
            let res = document.getElementById('result-text');

            // Reset UI
            c1.className = "card";
            c2.className = "card";

            // Comparison Logic
            if (ovr1 > ovr2) {
                c1.className = "card winner";
                res.innerHTML = "🏆 " + name1.toUpperCase() + " WINS!";
            } else if (ovr2 > ovr1) {
                c2.className = "card winner";
                res.innerHTML = "🏆 " + name2.toUpperCase() + " WINS!";
            } else if (ovr1 === 0 && ovr2 === 0) {
                res.innerHTML = "Enter your OVR to battle!";
            } else {
                res.innerHTML = "IT'S A DRAW!";
            }
        }
    </script>

</body>
</html>
