<!DOCTYPE html>
<html>
<head>
    <title>Fayaz's Site</title>
    <style>
        body { 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
            /* This sets the colors and makes the background big so it can move */
            background: linear-gradient(-45deg, #1e90ff, #8a2be2, #ff1493, #00ced1);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }

        /* This is the "brain" of the animation - it moves the background */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            font-size: 80px;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            /* This makes the text "pop" */
            animation: float 3s ease-in-out infinite;
        }

        /* This makes the name "Fayaz" bounce slowly up and down */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <h1>Fayaz</h1>

</body>
</html>
