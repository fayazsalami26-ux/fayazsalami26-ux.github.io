<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Club Game - Hardcore Mode</title>

<style>
body{margin:0;font-family:Arial;color:white;text-align:center;overflow-x:hidden;}
#matrix{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:-2;}
#particles-js{position:fixed;width:100%;height:100%;z-index:-1;}
.terminal{width:80%;max-width:650px;margin:50px auto;padding:20px;background:black;color:#00ff00;font-family:monospace;border-radius:10px;box-shadow:0 0 20px #00ff00;text-align:center;transition:0.3s;}
button.answerBtn{padding:10px 20px;margin:10px;font-size:16px;border-radius:8px;border:none;cursor:pointer;background:white;color:black;transition:0.3s;}
button.answerBtn:hover{background:lime; color:black;}
#message{margin-top:15px;font-weight:bold;transition:0.3s;}
.shake{animation:shake 0.5s;}
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-10px);}
  50%{transform:translateX(10px);}
  75%{transform:translateX(-10px);}
  100%{transform:translateX(0);}
}
.flashGreen{background-color:lime;color:black;}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="particles-js"></div>

<div class="terminal" id="gameContainer">
<h2>Hacker Club Game - Hardcore Mode</h2>
<div id="question">Click Start to begin Level 1!</div>
<div id="answers"></div>
<div id="message"></div>
<button onclick="startLevel(0)">Start</button>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>

/* GAME LOGIC */
let gameLevel = 0;

const levels = [
  {q: "Level 1: Which is the best club in the world?", options:["Real Madrid","Barcelona"], answer:"Real Madrid"},
  {q: "Level 2: Who is the best attacker?", options:["Mbappe","Yamal"], answer:"Mbappe"},
  {q: "Level 3: Who is the best goalkeeper?", options:["Courtois","Joan Garcia"], answer:"Courtois"},
  {q: "Level 4: Who is the best midfielder?", options:["Jude Bellingham","Pedri"], answer:"Jude Bellingham"}
];

function startLevel(levelIndex){
  gameLevel = levelIndex;
  const level = levels[levelIndex];
  document.getElementById("question").innerHTML = level.q;
  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";
  level.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "answerBtn";
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(opt);
    answersDiv.appendChild(btn);
  });
  const message = document.getElementById("message");
  message.innerHTML = "";
  const terminal = document.getElementById("gameContainer");
  terminal.classList.remove("flashGreen","shake");
  terminal.style.backgroundColor="black";
  terminal.style.color="#00ff00";
}

function checkAnswer(selected){
  const correct = levels[gameLevel].answer;
  const message = document.getElementById("message");
  const terminal = document.getElementById("gameContainer");

  if(selected === correct){
    message.innerHTML = "Vamooos! ⚽️";
    terminal.classList.remove("shake");
    terminal.classList.add("flashGreen");
    setTimeout(()=>terminal.classList.remove("flashGreen"),600);

    if(gameLevel+1 < levels.length){
      setTimeout(()=>startLevel(gameLevel+1),1000);
    } else {
      setTimeout(()=>{
        document.getElementById("question").innerHTML="🎉 You completed all levels! 🎉";
        document.getElementById("answers").innerHTML="";
        message.innerHTML="";
        terminal.style.backgroundColor="black";
        terminal.style.color="#00ff00";
      },1000);
    }
  } else {
    message.innerHTML = "Haha looser 😎 Restarting from Level 1...";
    terminal.classList.remove("flashGreen");
    terminal.classList.add("shake");
    setTimeout(()=>startLevel(0),1500);
  }
}

/* PARTICLES */
particlesJS("particles-js",{particles:{number:{value:80},size:{value:3},move:{speed:2},line_linked:{enable:true}}});

/* MATRIX EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix=letters.split("");
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=[];
for(let x=0;x<columns;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
const text=matrix[Math.floor(Math.random()*matrix.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
}
}
setInterval(draw,33);

</script>
</body>
</html>
