<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FC Mobile Squad Compare</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .container { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .team-card { background: #1e1e1e; border: 2px solid #edff00; padding: 20px; border-radius: 15px; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #edff00; color: black; padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        #winner-text { font-size: 24px; margin-top: 20px; color: #edff00; }
        .highlight { border: 4px solid gold !important; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>FC Mobile: Team vs Team</h1>
    <div class="container">
        <!-- Team 1 -->
        <div class="team-card" id="card1">
            <h3>Player 1</h3>
            <input type="text" id="uid1" placeholder="Enter UID (Ex: 12345678)">
            <input type="number" id="ovr1" placeholder="Team OVR">
            <input type="number" id="chem1" placeholder="Chemistry">
        </div>

        <!-- Team 2 -->
        <div class="team-card" id="card2">
            <h3>Player 2</h3>
            <input type="text" id="uid2" placeholder="Enter UID">
            <input type="number" id="ovr2" placeholder="Team OVR">
            <input type="number" id="chem2" placeholder="Chemistry">
        </div>
    </div>
    <button onclick="compareTeams()">COMPARE SQUADS</button>
    <div id="winner-text"></div>

    <script>
        function compareTeams() {
            let ovr1 = parseInt(document.getElementById('ovr1').value) || 0;
            let ovr2 = parseInt(document.getElementById('ovr2').value) || 0;
            let card1 = document.getElementById('card1');
            let card2 = document.getElementById('card2');
            let result = document.getElementById('winner-text');

            // Reset highlights
            card1.classList.remove('highlight');
            card2.classList.remove('highlight');

            if (ovr1 > ovr2) {
                card1.classList.add('highlight');
                result.innerText = "Player 1 has the stronger squad!";
            } else if (ovr2 > ovr1) {
                card2.classList.add('highlight');
                result.innerText = "Player 2 has the stronger squad!";
            } else {
                result.innerText = "It's a Draw! Both teams are equal.";
            }
        }
    </script>
</body>
</html>
