<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fayaz System</title>
<style>
body{
    margin:0;
    background:black;
    color:#00ff00;
    font-family: monospace;
    font-size:22px;
    overflow:hidden;
}

#terminal{
    position:absolute;
    top:40px;
    left:40px;
    z-index:2;
    white-space:pre;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

#flash{
    position:fixed;
    width:100%;
    height:100%;
    background:#00ff00;
    opacity:0;
    pointer-events:none;
    z-index:3;
}

#control{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:100px;
    color:#00ff00;
    text-shadow:0 0 20px #00ff00,0 0 40px #00ff00,0 0 60px #00ff00;
    display:none;
    z-index:4;
    text-align:center;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="flash"></div>
<div id="terminal"></div>
<div id="control">SYSTEM CONTROL<br>FAYAZ</div>

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(columns).fill(1);

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";
    for(let i = 0;i<drops.length;i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

// TERMINAL
const terminal = document.getElementById("terminal");
const ip = Array.from({length:4},()=>Math.floor(Math.random()*255)).join(".");
const bootLines = [
"Initializing secure system...",
"Scanning network...",
"IP FOUND: "+ip,
"Connecting...",
"Connection established",
"",
"ENTER PASSWORD: "
];

let i=0;
function boot(){
    if(i<bootLines.length){
        terminal.innerHTML+=bootLines[i]+"\n";
        i++;
        setTimeout(boot,800);
    } else {
        startPassword();
    }
}
boot();

// PASSWORD SIMULATION
let password = "";
function startPassword(){
    terminal.innerHTML+=">"; // show cursor
    document.addEventListener("keydown", handleTyping);
}

function handleTyping(e){
    if(e.key.length===1){
        password+=e.key;
        terminal.innerHTML+="*";
    } else if(e.key==="Backspace"){
        if(password.length>0){
            password=password.slice(0,-1);
            terminal.innerHTML=terminal.innerHTML.slice(0,-1);
        }
    } else if(e.key==="Enter"){
        terminal.innerHTML+="\n";
        document.removeEventListener("keydown",handleTyping);
        checkPassword();
    }
}

function checkPassword(){
    if(password==="Fayaz"){
        terminal.innerHTML+="Checking credentials...\n";
        const flash = document.getElementById("flash");
        flash.style.opacity="0.7";
        setTimeout(()=>flash.style.opacity="0",150);
        terminal.innerHTML+="\nACCESS GRANTED\nWELCOME FAYAZ\n";
        setTimeout(()=>document.getElementById("control").style.display="block",500);
    } else {
        terminal.innerHTML+="ACCESS DENIED\nTRY AGAIN\n";
        password="";
        startPassword();
    }
}
</script>

</body>
</html>
