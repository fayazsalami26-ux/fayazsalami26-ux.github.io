<!DOCTYPE html>
<html>
<head>
    <title>My Styled Site</title>
    <!-- 1. This link "grabs" the fancy font from Google -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        body {
            background-color: #0047AB; /* Your Blue background */
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Keeps the big text from making scrollbars */
        }

        .background-name {
            /* 2. Fancy Font & Size */
            font-family: 'Dancing Script', cursive;
            font-size: 15vw; /* "vw" makes it scale with the screen size */
            
            /* 3. Making it look like a background */
            color: rgba(255, 255, 255, 0.1); /* White but 90% see-through */
            position: absolute;
            z-index: -1; /* Pushes it behind everything else */
            white-space: nowrap;
            user-select: none; /* People can't accidentally highlight it */
        }

        .content {
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Put your name here! -->
    <div class="background-name">YOUR NAME</div>

    <div class="content">
        <h1>Welcome to My Project</h1>
        <p>This is my 9th grade CS practice.</p>
    </div>

</body>
</html>
