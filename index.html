<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Supercar Showroom & Test Drive</title>
<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}
h1{margin-top:20px;}
#brands button{
padding:15px 30px;
margin:10px;
border:2px solid #00aaff;
background:black;
color:white;
cursor:pointer;
}
#brands button:hover{background:#00aaff;color:black;}
#cars{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}
.car{margin:20px;}
.car img{
width:250px;
border:2px solid white;
cursor:pointer;
}
#showroom3d{
width:100%;
height:600px;
margin-top:40px;
border:2px solid #00aaff;
}
#carSpecs{
margin-top:20px;
font-size:18px;
}
#controls{
margin-top:20px;
}
#controls button{
padding:15px 25px;
margin:10px;
font-size:18px;
background:black;
color:white;
border:2px solid #00aaff;
cursor:pointer;
}
#controls button:hover{background:#00aaff;color:black;}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<h1>Ultimate Supercar Showroom & Test Drive</h1>

<div id="brands">
<button onclick="showBrand('bmw')">BMW</button>
<button onclick="showBrand('mercedes')">Mercedes</button>
<button onclick="showBrand('ferrari')">Ferrari</button>
<button onclick="showBrand('lamborghini')">Lamborghini</button>
<button onclick="showBrand('pagani')">Pagani</button>
<button onclick="showBrand('mclaren')">McLaren</button>
</div>

<div id="cars"></div>
<div id="showroom3d"></div>
<div id="carSpecs"></div>

<div id="controls">
<button onclick="driveLeft()">⬅️</button>
<button onclick="nitro()">⚡ Nitro</button>
<button onclick="driveRight()">➡️</button>
</div>

<script>
// Car and brand data
let cars={
bmw:[{name:"BMW M5 CS", img:"img/bmw-m5cs.jpg", model:"models/bmw-m5cs.glb", type:"Sedan", topSpeed:305, price:"$120,000"},
{name:"BMW X5", img:"img/bmw-x5.jpg", model:"models/bmw-x5.glb", type:"SUV", topSpeed:250, price:"$90,000"}],
mercedes:[{name:"Mercedes AMG GT", img:"img/amg-gt.jpg", model:"models/amg-gt.glb", type:"Coupe", topSpeed:320, price:"$150,000"},
{name:"Mercedes G63", img:"img/g63.jpg", model:"models/g63.glb", type:"SUV", topSpeed:230, price:"$160,000"}],
ferrari:[{name:"Ferrari SF90", img:"img/sf90.jpg", model:"models/sf90.glb", type:"Supercar", topSpeed:340, price:"$450,000"}],
lamborghini:[{name:"Lamborghini Aventador", img:"img/aventador.jpg", model:"models/aventador.glb", type:"Supercar", topSpeed:350, price:"$500,000"}],
pagani:[{name:"Pagani Huayra", img:"img/huayra.jpg", model:"models/huayra.glb", type:"Hypercar", topSpeed:370, price:"$2,600,000"}],
mclaren:[{name:"McLaren 720S", img:"img/720s.jpg", model:"models/720s.glb", type:"Supercar", topSpeed:341, price:"$300,000"}]
}

// Display brand cars
function showBrand(brand){
let container=document.getElementById("cars")
container.innerHTML=""
cars[brand].forEach(car=>{
let div=document.createElement("div")
div.className="car"
div.innerHTML=`<h3>${car.name} (${car.type})</h3>
<img src="${car.img}" onclick="show3D('${car.model}',${car.topSpeed},'${car.price}')">`
container.appendChild(div)
})
}

// Three.js showroom + test drive setup
let scene, camera, renderer, currentModel, city
let position=0, speed=0

function init3D(){
scene=new THREE.Scene()
scene.background=new THREE.Color(0x222222)
camera=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000)
camera.position.set(0,2,5)
renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,600)
document.getElementById("showroom3d").appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,10,10)
scene.add(light)

// Ground / city plane
let groundGeo=new THREE.PlaneGeometry(100,100,10,10)
let groundMat=new THREE.MeshStandardMaterial({color:0x333333})
city=new THREE.Mesh(groundGeo,groundMat)
city.rotation.x=-Math.PI/2
scene.add(city)

animate()
}

// Show 3D car model
function show3D(modelPath,topSpeed,price){
document.getElementById("carSpecs").innerText=`Top Speed: ${topSpeed} km/h | Price: ${price}`
if(currentModel) scene.remove(currentModel)
const loader=new THREE.GLTFLoader()
loader.load(modelPath,function(gltf){
currentModel=gltf.scene
currentModel.position.y=0
currentModel.position.z=0
scene.add(currentModel)
})
}

// Animate
function animate(){
requestAnimationFrame(animate)
if(currentModel) currentModel.position.z-=speed/1000
renderer.render(scene,camera)
}
init3D()

// Driving controls
document.addEventListener("keydown",function(e){
if(e.key==="ArrowLeft"){driveLeft()}
if(e.key==="ArrowRight"){driveRight()}
if(e.key==="ArrowUp"){nitro()}
if(e.key==="ArrowDown"){speed=0}
})
function driveLeft(){position-=0.2;if(currentModel) currentModel.position.x=position}
function driveRight(){position+=0.2;if(currentModel) currentModel.position.x=position}
function nitro(){speed=5;if(currentModel) currentModel.position.z-=0.5}
</script>

</body>
</html>
