<!DOCTYPE html>
<html>
<head>
    <title>Fayaz's M5 CS Speedster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            background: linear-gradient(-45deg, #1e90ff, #8a2be2, #ff1493, #00ced1);
            background-size: 400% 400%;
            overflow: hidden;
            transition: background 0.5s;
        }

        /* Speedometer Styles */
        .dashboard {
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 50%;
            border: 5px solid #444;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            z-index: 10;
        }

        #speed-text { font-size: 50px; font-weight: bold; margin: 0; color: #00ff00; }
        .unit { font-size: 15px; color: #aaa; }

        /* BMW Image Styles */
        #car-display {
            width: 85%;
            max-width: 500px;
            margin: 20px 0;
            border-radius: 20px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        h1 { 
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0px 5px 15px rgba(0,0,0,0.5);
            margin: 10px 0;
        }

        /* Button Controls */
        .controls { margin-top: 30px; display: flex; gap: 20px; }
        
        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .gas { background-color: #2ecc71; color: white; }
        .brake { background-color: #e74c3c; color: white; }
        button:active { transform: scale(0.9); }

        /* High-speed Animation */
        .fast-mode {
            animation: gradient 0.05s linear infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <p id="speed-text">0</p>
        <p class="unit">MPH</p>
    </div>

    <h1>Fayaz</h1>

    <!-- The BMW M5 CS -->
    <img id="car-display" src="https://upload.wikimedia.org" alt="BMW M5 CS">

    <div class="controls">
        <button class="gas" onmousedown="startGas()" onmouseup="stopGas()" ontouchstart="startGas()" ontouchend="stopGas()">GAS</button>
        <button class="brake" onclick="hitBrake()">BRAKE</button>
    </div>

    <script>
        let speed = 0;
        let accel;
        const speedDisplay = document.getElementById('speed-text');
        const car = document.getElementById('car-display');
        const body = document.body;

        function startGas() {
            // Speed up
            accel = setInterval(() => {
                if (speed < 400) { // Top speed set to 400
                    speed += 4;
                    updateVisuals();
                }
            }, 30);
            body.classList.add('fast-mode');
        }

        function stopGas() {
            clearInterval(accel);
            body.classList.remove('fast-mode');
        }

        function hitBrake() {
            speed = 0;
            updateVisuals();
            body.classList.remove('fast-mode');
            speedDisplay.style.color = "#ff0000"; 
            setTimeout(() => { speedDisplay.style.color = "#00ff00"; }, 400);
        }

        function updateVisuals() {
            speedDisplay.innerText = speed;
            
            // The faster you go, the more the car and name shake!
            const shake = speed / 30;
            const x = (Math.random() - 0.5) * shake;
            const y = (Math.random() - 0.5) * shake;
            
            car.style.transform = `translate(${x}px, ${y}px)`;
            document.querySelector('h1').style.transform = `translate(${-x}px, ${-y}px)`;
        }
    </script>

</body>
</html>
