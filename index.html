<!DOCTYPE html>
<html>
<head>
    <title>FC Mobile Team Compare</title>
    <style>
        .compare-box { display: flex; justify-content: space-around; padding: 20px; }
        .team { border: 2px solid #ccc; padding: 15px; width: 40%; }
        input { width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Compare Your FC Mobile Squad</h1>
    <div class="compare-box">
        <!-- Player 1 Entry -->
        <div class="team">
            <h3>Player 1 (You)</h3>
            <input type="text" placeholder="Enter UID">
            <input type="number" placeholder="Team OVR">
        </div>
        <!-- Player 2 Entry -->
        <div class="team">
            <h3>Player 2 (Friend)</h3>
            <input type="text" placeholder="Enter UID">
            <input type="number" placeholder="Team OVR">
        </div>
    </div>
    <button onclick="alert('In 10th grade, you will write the code to make this button compare the two!')">Compare Teams</button>
</body>
</html>
