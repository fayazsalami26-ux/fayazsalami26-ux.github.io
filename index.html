<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fayaz Hacker System</title>
<style>
body{
    margin:0;
    background:black;
    color:#00ff00;
    font-family: monospace;
    font-size:20px;
    overflow:hidden;
}

#terminal{
    position:absolute;
    top:20px;
    left:20px;
    z-index:2;
    white-space:pre-line;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

#control{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:100px;
    color:#00ff00;
    text-shadow:0 0 20px #00ff00,0 0 40px #00ff00,0 0 60px #00ff00;
    display:none;
    z-index:3;
    text-align:center;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="terminal"></div>
<div id="control">SYSTEM CONTROL<br>FAYAZ</div>

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(columns).fill(1);

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";
    for(let i=0;i<drops.length;i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

// RANDOM IP
function randomIP(){
    return Array.from({length:4},()=>Math.floor(Math.random()*255)).join(".");
}
const ip = randomIP();

// TERMINAL LINES
const bootLines = [
"Initializing secure system...",
"Loading security modules...",
"Scanning network...",
"IP FOUND: "+ip,
"Connecting to server...",
"Authentication protocol enabled...",
"Encrypting data streams...",
"Downloading firewall rules...",
"Checking proxy connections...",
"Initializing VPN tunnel...",
"Pinging mainframe...",
"Loading kernel modules...",
"Accessing encrypted databases...",
"System check complete...",
"Connection stable...",
"System ready."
];

const terminal = document.getElementById("terminal");
let i = 0;

// Extra animated events
function randomPortScan(){
    const port = Math.floor(Math.random()*65535);
    terminal.innerHTML+="[SCAN] Checking port "+port+"...\n";
}

function randomCPUScan(){
    const cpu = Math.floor(Math.random()*100);
    terminal.innerHTML+="[CPU] Usage "+cpu+"%\n";
}

function randomMemoryScan(){
    const mem = Math.floor(Math.random()*32000);
    terminal.innerHTML+="[MEMORY] "+mem+"MB used\n";
}

function networkPacket(){
    const packets = Math.floor(Math.random()*5000);
    terminal.innerHTML+="[NET] Packets transmitted: "+packets+"\n";
}

// Boot sequence with extra scans
function boot(){
    if(i<bootLines.length){
        terminal.innerHTML+=bootLines[i]+"\n";
        i++;
        // Random extra events
        const rand = Math.random();
        if(rand<0.2) randomPortScan();
        else if(rand<0.35) randomCPUScan();
        else if(rand<0.5) randomMemoryScan();
        else if(rand<0.6) networkPacket();
        setTimeout(boot,600);
    } else {
        // SHOW HUGE SYSTEM CONTROL TITLE
        setTimeout(()=>{
            document.getElementById("control").style.display="block";
        },500);
    }
}

boot();
</script>
</body>
</html>
