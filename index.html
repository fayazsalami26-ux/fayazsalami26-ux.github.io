<!DOCTYPE html>
<html>
<head>
    <title>Reaction Speed Test</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; overflow: hidden; }
        
        /* The Game Area */
        #game-area { width: 100vw; height: 80vh; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #333; transition: 0.1s; }
        
        .waiting { background: #e74c3c !important; } /* Red */
        .go { background: #2ecc71 !important; }      /* Green */
        
        h1 { font-size: 3rem; pointer-events: none; }
        #stats { font-size: 1.5rem; margin-top: 20px; }
        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; background: #edff00; }
    </style>
</head>
<body>

    <div id="stats">Click Start to test your reflexes!</div>
    
    <div id="game-area">
        <h1 id="instruction">WAIT FOR GREEN</h1>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="startGame()">START GAME</button>
        <button style="background: #555; color: white;" onclick="resetGame()">RESET</button>
    </div>

    <script>
        let startTime;
        let timeoutHandle;
        let isWaiting = false;
        let isGreen = false;

        const area = document.getElementById('game-area');
        const instruction = document.getElementById('instruction');
        const stats = document.getElementById('stats');

        function startGame() {
            resetGame();
            isWaiting = true;
            area.className = "waiting";
            instruction.innerText = "WAIT FOR IT...";
            
            // Generate a random wait time between 2 and 5 seconds
            let randomTime = Math.floor(Math.random() * 3000) + 2000;

            timeoutHandle = setTimeout(() => {
                area.className = "go";
                instruction.innerText = "CLICK NOW!!!";
                startTime = Date.now();
                isGreen = true;
                isWaiting = false;
            }, randomTime);
        }

        // What happens when you click the big colored box
        area.onclick = function() {
            if (isGreen) {
                let endTime = Date.now();
                let reactionTime = endTime - startTime;
                instruction.innerText = reactionTime + " ms";
                stats.innerText = "Your Speed: " + reactionTime + " milliseconds!";
                isGreen = false;
                area.style.background = "#333";
            } else if (isWaiting) {
                // Too early!
                clearTimeout(timeoutHandle);
                instruction.innerText = "TOO EARLY!";
                stats.innerText = "You clicked before it turned green!";
                isWaiting = false;
                area.style.background = "#333";
            }
        }

        function resetGame() {
            clearTimeout(timeoutHandle);
            isWaiting = false;
            isGreen = false;
            area.style.background = "#333";
            area.className = "";
            instruction.innerText = "READY?";
            stats.innerText = "Click Start to try again.";
        }
    </script>
</body>
</html>
