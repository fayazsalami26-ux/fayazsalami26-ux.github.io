<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fayaz System</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff00;
    font-family: monospace;
    padding:40px;
    font-size:22px;
}

#terminal{
    white-space:pre-line;
}
</style>

</head>
<body>

<div id="terminal"></div>

<script>

const lines = [
"Booting system...",
"Loading security modules...",
"Connecting to encrypted network...",
"Accessing mainframe...",
"System ready.",
"",
"Welcome Fayaz"
];

let i = 0;

function typeLine(){
    if(i < lines.length){
        const terminal = document.getElementById("terminal");
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 800);
    }
}

typeLine();

</script>

</body>
</html>
